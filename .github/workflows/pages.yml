name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A4DB9A: ${{ secrets.A4DB9A }}
          BFE11B: ${{ secrets.BFE11B }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A4DB9A', '')
          bm = os.environ.get('BFE11B', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 1e5d7882375ce1b2929f3f9d0ff7b9b1f75237ddc728 -->', gm)
              s2 = s2.replace('<!-- 5aea2456a09f23cab8cfba15b79ac78c4af5 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
